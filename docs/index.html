<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClaimCheck Daily</title>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9;
      --muted: #94a3b8; --accent: #38bdf8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif;
           max-width: 860px; margin: 0 auto; padding: 3rem 1rem; text-align: center; }
    h1 { font-size: 2.5rem; margin-bottom: .5rem; }
    p  { color: var(--muted); margin-bottom: 2rem; }
    .badge { display: inline-block; background: var(--surface); border-radius: .5rem;
             padding: 1rem 2rem; margin: .5rem; font-size: 1.1rem; }
    a { color: var(--accent); text-decoration: none; }
    footer { margin-top: 3rem; color: var(--muted); font-size: .85rem; }
  </style>
</head>
<body>
  <h1>📋 ClaimCheck Daily</h1>
  <p>Automated fact-checking powered by Claude + GPT-4o · Published daily via GitHub Actions</p>

  <div class="badge">
    <strong>Latest report:</strong><br>
    <a href="#">No reports yet — run the pipeline!</a>
  </div>

  <footer>
    This index is regenerated automatically after each pipeline run.<br>
    Powered by <a href="https://www.anthropic.com">Anthropic Claude</a> + OpenAI GPT-4o.
  </footer>
</body>
</html>
